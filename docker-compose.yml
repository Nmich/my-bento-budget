services:
  postgres:
    image: postgres:16-alpine
    container_name: my-bento-budget-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-bento-budget-api
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - postgres

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-bento-budget-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data: